<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow | Narendra Modi Stadium</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00C49A">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS styles -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/src/styles/attendee.css">
    <link rel="stylesheet" href="/src/styles/staff.css">
    <link rel="stylesheet" href="/src/styles/control.css">

    <!-- Firebase SDK (Modular) will be imported in JS -->

    <!-- i18n Helper -->
    <script type="module" src="/src/i18nHelper.js"></script>

    <!-- Google Maps JS API -->
    <script 
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAB-rkKZiGCOsnWR0gXhMyCOvau0iMYovs&libraries=places&callback=initMap" 
      async 
      defer>
    </script>

    <!-- App Diagnostics -->
    <script type="text/javascript">
        console.log("EventFlow: HTML Parsed. Booting...");
        window.addEventListener('error', (e) => console.error("Global Error:", e.message, "at", e.filename));
    </script>
</head>
<body>
    <div id="translator-container">
        <div id="google_translate_element"></div>
    </div>
    
    <!-- Main App Container -->
    <div id="app"></div>

    <!-- Scripts -->
    <script type="module" src="/js/router.js"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>

    <!-- Deferred Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
        setTimeout(() => {
            const script = document.createElement('script');
            script.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
            document.body.appendChild(script);
        }, 3000);
    </script>
</body>
</html>
